services:
  - type: web
    name: lms-backend
    env: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: FRONTEND_URL
        sync: false # Set this in Render dashboard to your Vercel URL (e.g., https://your-app.vercel.app)
      - key: DATABASE_URL
        sync: false # Set this to your Aiven MySQL connection string
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
